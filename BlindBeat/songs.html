<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Chansons - BlindBeat</title>
    <style>
        :root {
            --bg: #0A0A1A;
            --surface: #12122A;
            --surface-light: #1E1E40;
            --primary: #F5820D;
            --primary-light: #FF9F43;
            --accent-gold: #FFD700;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0C0;
            --border: #2A2A50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .nav a.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .song-card {
            display: flex;
            align-items: center;
            background: var(--surface);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            gap: 15px;
        }

        .song-cover {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
        }

        .song-details {
            flex: 1;
        }

        .song-title {
            font-weight: bold;
            color: var(--text-primary);
            display: block;
        }

        .song-artist {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .count-badge {
            background: var(--surface-light);
            padding: 5px 12px;
            border-radius: 15px;
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 0.85rem;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎵 Chansons les plus jouées</h1>
        <p>Découvrez les hits favoris de la communauté.</p>
    </header>

    <div class="nav">
        <a href="leaderboard.html">Top Joueurs</a>
        <a href="songs.html" class="active">Top Chansons</a>
        <a href="activity.html">Activité</a>
    </div>

    <div id="filters" class="filter-bar">
        <!-- Rempli dynamiquement -->
    </div>

    <div id="content">
        <div class="loading">Analyse des salons en cours...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const THEMES = [
        { id: '0', label: 'Tout' },
        { id: '132', label: 'Pop' },
        { id: '116', label: 'Rap' },
        { id: '152', label: 'Rock' },
        { id: '113', label: 'Electro' },
        { id: '165', label: 'R&B' },
        { id: '464', label: 'Metal' },
        { id: '129', label: 'Jazz' },
        { id: '98', label: 'Classique' },
        { id: '173', label: 'Film' },
    ];

    let currentGenre = '0';
    let allRooms = [];

    function renderFilters() {
        const filterEl = document.getElementById('filters');
        filterEl.innerHTML = THEMES.map(t => `
            <button class="filter-btn ${currentGenre === t.id ? 'active' : ''}"
                    onclick="window.setGenre('${t.id}')">
                ${t.label}
            </button>
        `).join('');
    }

    window.setGenre = (id) => {
        currentGenre = id;
        renderFilters();
        processSongs();
    };

    async function loadData() {
        try {
            await signInAnonymously(auth);
            const roomsRef = ref(db, 'rooms');
            const recentRoomsQuery = query(roomsRef, limitToLast(300));
            const snapshot = await get(recentRoomsQuery);

            if (snapshot.exists()) {
                snapshot.forEach(child => allRooms.push(child.val()));
            }

            renderFilters();
            processSongs();
        } catch (error) {
            console.error(error);
            document.getElementById('content').innerHTML = "<div class='loading'>Erreur lors du chargement.</div>";
        }
    }

    function processSongs() {
        const content = document.getElementById('content');
        const songCounts = {};

        allRooms.forEach((room) => {
            // Filtrer par genre si nécessaire
            if (currentGenre !== '0' && room.theme?.id !== currentGenre) return;

            if (room.questions) {
                room.questions.forEach(q => {
                    const id = q.id;
                    if (!id) return;
                    if (!songCounts[id]) {
                        songCounts[id] = {
                            count: 0,
                            title: q.trackTitle,
                            artist: q.trackArtist,
                            cover: q.cover
                        };
                    }
                    songCounts[id].count++;
                });
            }
        });

        const sortedSongs = Object.values(songCounts).sort((a, b) => b.count - a.count).slice(0, 50);

        if (sortedSongs.length === 0) {
            content.innerHTML = "<div class='loading'>Aucune chanson trouvée pour ce filtre.</div>";
            return;
        }

        let html = "";
        sortedSongs.forEach((s) => {
            html += `
                <div class="song-card">
                    <img src="${s.cover || 'https://via.placeholder.com/60'}" class="song-cover" alt="cover">
                    <div class="song-details">
                        <span class="song-title">${s.title}</span>
                        <span class="song-artist">${s.artist}</span>
                    </div>
                    <div class="count-badge">${s.count} fois</div>
                </div>
            `;
        });
        content.innerHTML = html;
    }

    loadData();
</script>

</body>
</html>

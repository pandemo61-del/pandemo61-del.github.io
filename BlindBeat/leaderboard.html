<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement - BlindBeat</title>
    <style>
        :root {
            --bg: #0A0A1A;
            --surface: #12122A;
            --surface-light: #1E1E40;
            --primary: #F5820D;
            --primary-light: #FF9F43;
            --accent-gold: #FFD700;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0C0;
            --border: #2A2A50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .nav a.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th {
            background: var(--surface-light);
            padding: 15px;
            text-align: left;
            color: var(--primary-light);
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: var(--accent-gold);
            width: 50px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            font-size: 1.5rem;
        }

        .score {
            font-weight: 700;
            color: var(--primary-light);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-style: italic;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏆 BlindBeat Leaderboard</h1>
        <p>Les meilleurs joueurs du monde !</p>
    </header>

    <div class="nav">
        <a href="leaderboard.html" class="active">Top Joueurs</a>
        <a href="songs.html">Top Chansons</a>
        <a href="activity.html">Activité</a>
    </div>

    <div id="content">
        <div class="loading">Chargement des statistiques...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    async function loadLeaderboard() {
        try {
            await signInAnonymously(auth);

            const usersRef = ref(db, 'users/production');
            // Utilise les stats allTime pour un classement historique permanent
            const topQuery = query(usersRef, orderByChild('stats/allTime/totalScore'), limitToLast(50));

            const snapshot = await get(topQuery);
            const content = document.getElementById('content');

            if (!snapshot.exists()) {
                content.innerHTML = "<div class='loading'>Aucune donnée disponible.</div>";
                return;
            }

            const players = [];
            snapshot.forEach((child) => {
                players.push(child.val());
            });

            // Firebase returns in ascending order, we want descending
            players.sort((a, b) => (b.stats?.allTime?.totalScore || 0) - (a.stats?.allTime?.totalScore || 0));

            let html = `<table>
                <thead>
                    <tr>
                        <th>Rang</th>
                        <th>Joueur</th>
                        <th>Score Total</th>
                        <th>Victoires</th>
                        <th>Précision</th>
                    </tr>
                </thead>
                <tbody>`;

            players.forEach((p, index) => {
                const s = p.stats?.allTime || p.stats; // Fallback pour les anciens profils non migrés
                const accuracy = s?.totalAnswers > 0
                    ? Math.round((s.correctAnswers / s.totalAnswers) * 100)
                    : 0;

                html += `
                    <tr>
                        <td class="rank">#${index + 1}</td>
                        <td>
                            <div class="player-info">
                                <span class="avatar">${p.avatar || '🎵'}</span>
                                <span>${p.name || 'Anonyme'}</span>
                            </div>
                        </td>
                        <td class="score">${s?.totalScore || 0}</td>
                        <td>${s?.gamesWon || 0}</td>
                        <td>${accuracy}%</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            content.innerHTML = html;

        } catch (error) {
            console.error(error);
            document.getElementById('content').innerHTML = "<div class='loading'>Erreur lors du chargement.</div>";
        }
    }

    loadLeaderboard();
</script>

</body>
</html>

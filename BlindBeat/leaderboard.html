<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement - BlindBeat</title>
    <style>
        :root {
            --bg: #0A0A1A;
            --surface: #12122A;
            --surface-light: #1E1E40;
            --primary: #F5820D;
            --primary-light: #FF9F43;
            --accent-gold: #FFD700;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0C0;
            --border: #2A2A50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .nav a.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th {
            background: var(--surface-light);
            padding: 15px;
            text-align: left;
            color: var(--primary-light);
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: var(--accent-gold);
            width: 50px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            font-size: 1.5rem;
        }

        .score {
            font-weight: 700;
            color: var(--primary-light);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-style: italic;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏆 BlindBeat Leaderboard</h1>
        <p>Les meilleurs joueurs du monde !</p>
    </header>

    <div class="nav">
        <a href="leaderboard.html" class="active">Top Joueurs</a>
        <a href="songs.html">Top Chansons</a>
        <a href="activity.html">Activité</a>
    </div>

    <div id="content">
        <div class="loading">Chargement des statistiques...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    // Intégration directe pour éviter les erreurs d'import local (CORS/file://)
    const firebaseConfig = {
        apiKey: "AIzaSyC6H0bm0KdUO_4K_pgZBv7aaB29JMUNvik",
        authDomain: "blindbeat-a51d5.firebaseapp.com",
        databaseURL: "https://blindbeat-a51d5-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "blindbeat-a51d5",
        storageBucket: "blindbeat-a51d5.firebasestorage.app",
        messagingSenderId: "1037778546860",
        appId: "1:1037778546860:android:003d51beb7c44ce3d5ef09",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    async function loadLeaderboard() {
        const content = document.getElementById('content');
        try {
            console.log("Tentative de connexion...");
            await signInAnonymously(auth);
            console.log("Connecté !");

            const usersRef = ref(db, 'users/production');
            const topQuery = query(usersRef, orderByChild('stats/allTime/totalScore'), limitToLast(50));

            console.log("Récupération des données...");
            const snapshot = await get(topQuery);

            if (!snapshot.exists()) {
                content.innerHTML = "<div class='loading'>Aucune donnée disponible. Essayez de trier par score simple si allTime est vide.</div>";

                // Fallback vers les anciennes stats si allTime n'est pas encore peuplé
                const fallbackQuery = query(usersRef, orderByChild('stats/totalScore'), limitToLast(50));
                const fallbackSnap = await get(fallbackQuery);
                if (!fallbackSnap.exists()) return;
                renderData(fallbackSnap);
                return;
            }

            renderData(snapshot);

        } catch (error) {
            console.error("Erreur détaillée:", error);
            content.innerHTML = `<div class='loading'>Erreur : ${error.message}<br><small>Vérifiez les règles d'indexation dans Firebase.</small></div>`;
        }
    }

    function renderData(snapshot) {
        const content = document.getElementById('content');
        const players = [];
        snapshot.forEach((child) => {
            players.push(child.val());
        });

        // Tri descendant
        players.sort((a, b) => {
            const scoreA = a.stats?.allTime?.totalScore || a.stats?.totalScore || 0;
            const scoreB = b.stats?.allTime?.totalScore || b.stats?.totalScore || 0;
            return scoreB - scoreA;
        });

        let html = `<table>
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Joueur</th>
                    <th>Score Total</th>
                    <th>Victoires</th>
                    <th>Précision</th>
                </tr>
            </thead>
            <tbody>`;

        players.forEach((p, index) => {
            const s = p.stats?.allTime || p.stats;
            const accuracy = s?.totalAnswers > 0
                ? Math.round((s.correctAnswers / s.totalAnswers) * 100)
                : 0;

            html += `
                <tr>
                    <td class="rank">#${index + 1}</td>
                    <td>
                        <div class="player-info">
                            <span class="avatar">${p.avatar || '🎵'}</span>
                            <span>${p.name || 'Anonyme'}</span>
                        </div>
                    </td>
                    <td class="score">${s?.totalScore || 0}</td>
                    <td>${s?.gamesWon || 0}</td>
                    <td>${accuracy}%</td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        content.innerHTML = html;
    }

    loadLeaderboard();
</script>

</body>
</html>
